name: PTR-94 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy pytest
        pip install -r simulation/requirements.txt

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check --output-format=github .

    - name: Test with pytest
      run: |
        python -m pytest tests/ -v

    - name: Run stoichiometry verification
      run: |
        python simulation/stoichiometry_verification.py

    - name: Run experiments smoke test
      run: |
        python -c "
        from simulation.experiments import *
        l = LeakageSensitivityExperiment()
        l.run()
        print('Leakage experiment: OK')
        a = ATPFreeEnergyExperiment()
        a.run()
        print('ATP free energy experiment: OK')
        "

    - name: Run benchmarks smoke test
      run: |
        python -c "
        from simulation.benchmarks import *
        m = NaturalMitochondriaBenchmark()
        m.run()
        print('Mitochondria benchmark: OK')
        "
